name: Fetch Kanpo RSS Feed

on:
  schedule:
    # 毎日 06:00 JST（UTC 21:00）
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo files (debug)
        run: |
          echo "== pwd =="
          pwd
          echo "== ls =="
          ls -la
          echo "== find requirements.txt =="
          find . -maxdepth 2 -name "requirements.txt" -print

      - name: Install dependencies (force)
        run: |
          python -m pip install --upgrade pip
          # requirements.txt があれば使う
          if [ -f requirements.txt ]; then
            echo "requirements.txt found. Installing..."
            python -m pip install -r requirements.txt
          else
            echo "requirements.txt not found. Installing packages directly..."
            python -m pip install feedparser requests certifi
          fi

          echo "== pip list (debug) =="
          python -m pip list | grep -E "feedparser|requests|certifi" || true

      - name: Run Python script
        run: |
          python fetch_rss.py

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/kanpo_feed.json
          git commit -m "Update kanpo_feed.json"
          git push
