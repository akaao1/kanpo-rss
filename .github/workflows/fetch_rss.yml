name: Fetch Kanpo RSS Feed

on:
  schedule:
    # 毎日 06:00 JST（UTC 21:00）
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ネットワーク切り分け用（失敗時の原因が分かりやすい）
      - name: Quick connectivity check (optional)
        run: |
          python - << 'PY'
          import ssl, urllib.request
          url = "https://www.kanpo.go.jp/rss/latest.xml"
          print("Checking:", url)
          try:
            ctx = ssl.create_default_context()
            with urllib.request.urlopen(url, context=ctx, timeout=20) as r:
              print("HTTP status:", r.status)
              print("Content-Type:", r.headers.get("Content-Type"))
          except Exception as e:
            print("Connectivity check failed:", type(e).__name__, e)
            raise
          PY

      - name: Run Python script
        run: |
          python fetch_rss.py

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 差分がないなら何もしない
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/kanpo_feed.json
          git commit -m "Update kanpo_feed.json"
          git push
