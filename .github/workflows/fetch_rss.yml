name: Fetch Kanpo RSS Feed

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日06:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ★ここで「requirements.txtが本当に存在するか」を可視化
      - name: Debug - show files
        run: |
          echo "== pwd =="; pwd
          echo "== ls =="; ls -la
          echo "== find requirements.txt =="; find . -maxdepth 2 -name "requirements.txt" -print

      # ★ここで「同じpythonでpipを実行」するのが重要（pip単体は使わない）
      - name: Install dependencies (must)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "requirements.txt found -> installing"
            python -m pip install -r requirements.txt
          else
            echo "requirements.txt NOT found -> installing directly"
            python -m pip install feedparser requests certifi
          fi

      # ★ここで「requestsが入ったか」を100%判定する
      - name: Verify imports (must)
        run: |
          python -c "import requests, feedparser, certifi; print('requests=', requests.__version__); print('feedparser=', feedparser.__version__); print('certifi=', certifi.__version__)"

      - name: Create data directory
        run: |
          mkdir -p data

      - name: Run Python script
        run: |
          python fetch_rss.py

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/kanpo_feed.json
          git commit -m "Update kanpo_feed.json"
          git push
