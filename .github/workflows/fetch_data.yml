name: Fetch and Merge Kanpo RSS Data

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * *"   # 毎日 00:00 UTC（= JST 09:00）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # ここが見えれば「正しいworkflowが動いている」ことが確定します
      - name: Verify imports
        run: |
          python -c "import requests, feedparser, certifi; print('OK:', requests.__version__, feedparser.__version__, certifi.__version__)"

      - name: Create data directory
        run: |
          mkdir -p data

      - name: Run Python script
        run: |
          python fetch_rss.py

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/kanpo_feed.json
          git commit -m "Auto: Update kanpo-rss data with new entries"
          git push
